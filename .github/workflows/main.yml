name: Otomatik Unit Test Akisi

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Python Kurulumu
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Testleri Calistir
      run: |
        python -m unittest test_validator.py -v
